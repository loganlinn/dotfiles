#
# kitty +runpy 'from kitty.config import *; print(commented_out_default_config())' > kitty.default.conf
#

env read_from_shell=PATH LANG LC_* XDG_* EDITOR VISUAL
editor .
shell_integration enabled
allow_remote_control socket-only
listen_on unix:kitty.sock
startup_session work.kitty-session

font_family Victor Mono
font_size 12
background_opacity 1.0
# text_composition_strategy legacy
# modify_font cell_width -1px
disable_ligatures cursor
cursor_shape block
cursor_shape_unfocused hollow
cursor_underline_thickness 1
cursor_trail 0
cursor_trail_start_threshold 50
cursor_trail_decay 0.1 0.4
cursor_trail_color #5B6268

dim_opacity 0.3
dynamic_background_opacity yes
hide_window_decorations titlebar-only
inactive_text_alpha 0.68
single_window_margin_width -1
single_window_padding_width -1
window_border_width 0.5pt
window_margin_width 0
window_padding_width 0
window_resize_step_cells 2
window_resize_step_lines 2
scrollbar scrolled
scrollback_lines 8096
scrollback_pager_history_size 4096
momentum_scroll 0.96

enable_audio_bell    no
visual_bell_duration 0.1
visual_bell_color    #44495a
bell_on_tab          "🔔"
notify_on_cmd_finish invisible 15

menu_map    global  "Actions::Pop keyboard mode"  pop_keyboard_mode
menu_map    global  "Actions::Command palette"    command_palette
menu_map    global  "Actions::Kitty shell"        kitty_shell

allow_hyperlinks       yes
show_hyperlink_targets yes
detect_urls            yes
open_url_with          default
url_prefixes           http https file ftp gemini irc gopher mailto news git at postgres clickhouse mysql exec
url_style              curly

paste_actions         quote-urls-at-prompt,confirm,confirm-if-large
strip_trailing_spaces smart

# Tabs
active_tab_font_style bold
inactive_tab_font_style none
tab_activity_symbol "⁺"
tab_switch_strategy previous
tab_bar_filter session:~ or session:^$
tab_bar_align left
tab_bar_background none
tab_bar_edge bottom
tab_bar_margin_height 0.0 0.0
tab_bar_margin_width 10
tab_bar_min_tabs 1
tab_bar_style custom
tab_separator " "
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}:{'🇿' if layout_name == 'stack' and num_windows > 1 else ''}{title}{' ' * (max_title_length - len(title) - 2) if len(title) < max_title_length else ''}"
tab_title_max_length 32
active_tab_title_template "{f' [{keyboard_mode}] ' if keyboard_mode else ''}{f' [{session_name}] ' if session_name else ''}{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}:{'🇿' if layout_name == 'stack' and num_windows > 1 else ''}{title}{' ' * (max_title_length - len(title) - 2) if len(title) < max_title_length else ''}"

# Windows
# active_window_title_template "WINDOW"
# window_title_bar_min_windows 1
# window_title_bar top
# window_title_bar_active_foreground white
# window_title_bar_active_background green
# window_title_bar_inactive_foreground white
# window_title_bar_inactive_background none

enabled_layouts splits,stack,tall:bias=66,fat:bias=66,grid,horizontal,vertical

kitten_alias hints         hints --hints-offset=0 --alphabet=abcdefghijklmnopqrstuvwxyz

# action_alias launch_tab             launch --add-to-session=. --cwd=oldest --location=after --type=tab
# action_alias launch_window          launch --add-to-session=. --cwd=oldest --location=after --type=window
action_alias broadcast              launch --allow-remote-control kitty +kitten broadcast --hide-input-toggle=ctrl+alt+esc --end-session=ctrl+esc
action_alias launch_tab             new_tab_with_cwd
action_alias launch_window          combine : goto_layout splits : launch --add-to-session=. --cwd=oldest --location=split  --type=window
action_alias launch_vsplit          combine : goto_layout splits : launch --add-to-session=. --cwd=oldest --location=vsplit --type=window
action_alias launch_hsplit          combine : goto_layout splits : launch --add-to-session=. --cwd=oldest --location=hsplit --type=window
action_alias resize_window_narrower resize_window narrower 4
action_alias resize_window_shorter  resize_window shorter 2
action_alias resize_window_taller   resize_window taller 2
action_alias resize_window_wider    resize_window wider 4

####################################################################
# OS Specific
####################################################################

linux_display_server               auto

macos_colorspace                   srgb
macos_custom_beam_cursor           yes # REVIEW
macos_hide_from_tasks              no
macos_menubar_title_max_length     0
macos_option_as_alt                no
macos_quit_when_last_window_closed yes
macos_show_window_title_in         all
macos_titlebar_color               background
macos_traditional_fullscreen       no
macos_window_resizable             yes

wayland_enable_ime                 yes
wayland_titlebar_color             system

####################################################################
